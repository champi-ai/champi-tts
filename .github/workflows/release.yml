# Security Note: Manual releases only via git tags
# To create a release: git tag vX.Y.Z && git push origin tag vX.Y.Z
name: Manual Release (Git Tags Only)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build hatchling
          python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v3
        with:
          name: champi-tts-artifacts
          path: dist/

      - name: Create Git tag release
        run: |
          # Tag is already created by GitHub on push
          echo "Git tag created: ${{ github.ref_name }}"

      - name: Create GitHub Release from tag
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
