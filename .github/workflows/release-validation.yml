name: Release Process Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Run release validation script
        run: |
          chmod +x scripts/validate_release.sh
          ./scripts/validate_release.sh

      - name: Check package builds successfully
        run: |
          python -m build --wheel --outdir dist/

      - name: Verify package passes twine check
        run: |
          python -m twine check dist/*

      - name: Validate package metadata
        run: |
          python -c "
          import tomli
          import sys

          with open('pyproject.toml', 'rb') as f:
              config = tomli.load(f)

          version = config.get('project', {}).get('version', '')
          name = config.get('project', {}).get('name', '')
          description = config.get('project', {}).get('description', '')
          license = config.get('project', {}).get('license', {})

          errors = []
          if not version:
              errors.append('Version not found')
          if not name:
              errors.append('Name not found')
          if not description:
              errors.append('Description not found')
          if isinstance(license, dict) and 'text' not in license:
              errors.append('License text not found')

          if errors:
              print('Metadata errors:')
              for error in errors:
                  print(f'  - {error}')
              sys.exit(1)
          else:
              print('Package metadata is valid')
              print(f'  Version: {version}')
              print(f'  Name: {name}')
              print(f'  Description: {description}')
          "

      - name: Check changelog exists
        run: |
          if [ ! -f "CHANGELOG.md" ]; then
            echo "ERROR: CHANGELOG.md not found"
            exit 1
          fi
          echo "CHANGELOG.md exists and is valid"

      - name: Validate version consistency
        run: |
          # Extract version from pyproject.toml
          PROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\([0-9.]*\)"/\1/')
          echo "Project version: $PROJECT_VERSION"

          # Extract version from __init__.py
          INIT_VERSION=$(grep -E '__version__' src/champi_tts/__init__.py | sed 's/__version__ = "\([0-9.]*\)"/\1/')
          echo "__init__.py version: $INIT_VERSION"

          if [ "$PROJECT_VERSION" = "$INIT_VERSION" ]; then
            echo "✓ Version consistency check passed"
          else
            echo "✗ Version mismatch between pyproject.toml and __init__.py"
            exit 1
          fi

      - name: Check release workflow exists
        run: |
          if [ ! -f ".github/workflows/release.yml" ]; then
            echo "ERROR: .github/workflows/release.yml not found"
            exit 1
          fi
          echo "Release workflow exists"

      - name: Verify workflow syntax
        run: |
          python -c "
          import yaml
          import sys

          try:
              with open('.github/workflows/release.yml', 'r') as f:
                  workflow = yaml.safe_load(f)

              print('Workflow is valid YAML')
              print(f'  Trigger events: {list(workflow.get(\"on\", {}).keys())}')

              if 'build-and-publish' in workflow.get('jobs', {}):
                  print('✓ Build and publish job exists')
              else:
                  print('✗ Build and publish job not found')
                  sys.exit(1)
          except Exception as e:
              print(f'ERROR: {e}')
              sys.exit(1)
          "

      - name: Check for required dependencies
        run: |
          REQUIRED_DEPS=("numpy" "sounddevice" "soundfile" "loguru" "blinker" "champi-signals")

          for dep in "${REQUIRED_DEPS[@]}"; do
            if grep -q "\"$dep\"" pyproject.toml; then
              echo "✓ $dep is listed"
            else
              echo "⚠ $dep is not explicitly listed"
            fi
          done

      - name: Validate semantic versioning
        run: |
          VERSION=$(grep -E '^version = ' pyproject.toml | sed 's/version = "\([0-9.]*\)"/\1/')

          if [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "✓ Semantic version format: $VERSION"
          else
            echo "✗ Invalid semantic version format: $VERSION"
            exit 1
          fi