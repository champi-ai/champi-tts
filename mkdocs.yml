site_name: Champi TTS
site_description: Multi-provider text-to-speech library with voice assistant features
site_url: https://champi-ai.github.io/champi-tts/
repo_url: https://github.com/champi-ai/champi-tts
repo_name: champi-ai/champi-tts
edit_uri: edit/main/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: google
            members_order: source
            show_signature_annotations: true

nav:
  - Home: README.md
  - Getting Started:
      - Quick Start: user/getting-started.md
      - User Guide: USER_GUIDE.md
      - FAQ: user/faq.md
  - User Guides:
      - Audio Features: user/audio-features.md
      - CLI Guide: user/cli-guide.md
      - Python API: user/python-api.md
      - Text Reading: user/text-reading.md
      - Troubleshooting: user/troubleshooting.md
  - Tutorials: TUTORIALS.md
  - API Reference: api.md
  - Migration Guide: migration.md
  - Development:
      - Contributing: developer/contributing.md
      - Release Process: release-process.md
      - Benchmarking: BENCHMARKING.md
      - Security Audit: security-audit-report.md
      - Progress Review: PROGRESS_REVIEW.md
  - Release Notes: RELEASE_NOTES.md
  - Troubleshooting: TROUBLESHOOTING.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true
